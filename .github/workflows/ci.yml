name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Compile
        run: ./mill __.compile

      - name: Test
        run: ./mill __.test

      - name: Format check
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll
