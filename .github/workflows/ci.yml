name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Cache Coursier
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: ${{ runner.os }}-coursier-${{ hashFiles('build.mill', 'mill-build/build.mill', '**/build.mill') }}
          restore-keys: ${{ runner.os }}-coursier-

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('.mill-version') }}
          restore-keys: ${{ runner.os }}-mill-

      - name: Compile
        run: ./mill __.compile

      - name: Test
        run: ./mill __.test

      - name: Format check
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll
