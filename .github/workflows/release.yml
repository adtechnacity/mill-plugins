name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Compile
        run: ./mill __.compile

      - name: Test
        run: ./mill __.test

      - name: Publish to GitHub Packages
        run: ./mill __.publishM2Local /tmp/repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
